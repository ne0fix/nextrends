name = "nextface-pixel"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
WEB_API_URL = "https://nextrends-web.vercel.app"

# Secrets (set via: wrangler secret put UPSTASH_REDIS_REST_URL)
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# WORKER_SECRET

[[routes]]
pattern = "pixel.nextface.app/*"
zone_name = "nextface.app"
